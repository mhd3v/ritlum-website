name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blog-src/package-lock.json

      - name: Install blog dependencies
        working-directory: blog-src
        run: npm ci

      - name: Build blog
        working-directory: blog-src
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html CNAME .nojekyll device.png hero-device-v3.png rt-*.jsx site/
          cp -r assets privacy .well-known site/
          cp -r blog-src/dist site/blog

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
