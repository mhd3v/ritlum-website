        <title>Ritlum - your habits, brought into the light</title>
        <meta
            name="description"
            content="A beautiful habit app and Ritlum, a physical desk tracker that mirrors your progress in glowing light. Tap an NFC token to log a habit."
        />

        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                background: #faf8f4;
            }
            * {
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro",
                    system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }
            a {
                -webkit-tap-highlight-color: transparent;
            }
            html {
                scroll-behavior: smooth;
            }
            ::selection {
                background: rgba(91, 157, 249, 0.3);
            }

            .rt-show-mobile {
                display: none;
            }

            /* device breathing glow: keep this on opacity so the LED matrix is not
       repainted through a filter on every frame. */
            @keyframes rt-breathe-kf {
                0%,
                100% {
                    opacity: 0.16;
                }
                50% {
                    opacity: 0.42;
                }
            }
            .rt-breathe {
                contain: paint;
                isolation: isolate;
                overflow: hidden;
            }
            .rt-breathe::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;
                pointer-events: none;
                background: radial-gradient(
                    70% 80% at 50% 44%,
                    rgba(255, 255, 255, 0.18),
                    rgba(255, 255, 255, 0.04) 54%,
                    transparent 78%
                );
                opacity: 0.16;
                animation: rt-breathe-kf 4.5s ease-in-out infinite;
                will-change: opacity;
                transform: translateZ(0);
                z-index: 1;
            }

            /* NFC token emitted ripples */
            @keyframes rt-ripple-kf {
                0% {
                    transform: scale(0.85);
                    opacity: 0;
                }
                18% {
                    opacity: 0.7;
                }
                100% {
                    transform: scale(2.1);
                    opacity: 0;
                }
            }
            .rt-ripple {
                animation: rt-ripple-kf 1.5s ease-out infinite;
            }

            @keyframes rt-fade-up-kf {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .rt-carousel-arrow {
                transition:
                    background 200ms ease,
                    box-shadow 200ms ease;
            }
            .rt-carousel-arrow:hover {
                background: #fff;
                box-shadow:
                    0 2px 6px rgba(20, 20, 20, 0.08),
                    0 8px 22px rgba(20, 20, 20, 0.07);
            }
            .rt-carousel-dot {
                transition:
                    width 300ms ease,
                    background 300ms ease;
                cursor: pointer;
            }

            @media (prefers-reduced-motion: reduce) {
                .rt-breathe::after,
                .rt-ripple {
                    animation: none !important;
                }
                html {
                    scroll-behavior: auto;
                }
            }

            /* responsive */
            @media (max-width: 920px) {
                .rt-trio,
                .rt-features {
                    grid-template-columns: 1fr 1fr !important;
                }
                .rt-features > * {
                    grid-column: span 1 !important;
                }
            }
            @media (max-width: 860px) {
                .rt-pricing {
                    grid-template-columns: 1fr !important;
                }
            }
            @media (max-width: 720px) {
                .rt-navlinks {
                    display: none !important;
                }
                .rt-hide-mobile {
                    display: none !important;
                }
                .rt-show-mobile {
                    display: inline !important;
                }
                .rt-nav-toggle {
                    display: inline-flex !important;
                }
                .rt-hero-image {
                    margin: 0 -56px !important;
                }
                .rt-tracker-showcase {
                    padding: 32px 20px !important;
                }
                .rt-tracker-showcase-inner {
                    flex-direction: column !important;
                    gap: 28px !important;
                }
                .rt-tracker-callouts {
                    flex-basis: auto !important;
                    align-items: center !important;
                }
                .rt-tracker-product {
                    width: min(520px, 96%) !important;
                }
                .rt-trio,
                .rt-features {
                    grid-template-columns: 1fr !important;
                }
                .rt-timeline {
                    grid-template-columns: 1fr !important;
                    gap: 36px !important;
                }
                .rt-timeline-line {
                    display: none !important;
                }
            }
        </style>
