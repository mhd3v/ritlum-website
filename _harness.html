<body>
  <div id="stage"></div>
  <div id="spacer"></div>

  <script type="text/babel" data-presets="react">
    const SCALE = 1.3;
    const Bezel = ({ children }) => (
      <div style={{
        width: 402, height: 874, borderRadius: 48, overflow: 'hidden',
        position: 'relative', background: T.bg,
        boxShadow: '0 0 0 10px #16151a, 0 0 0 11px rgba(0,0,0,0.55)',
      }}>
        <div style={{
          position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 32, borderRadius: 20, background: '#000', zIndex: 50,
        }} />
        {children}
      </div>
    );

    const SCREENS = {
      today:   () => <TodayScreen />,
      stats:   () => <StatsScreen />,
      history: () => <HistoryScreenMain />,
    };

    let root = ReactDOM.createRoot(document.getElementById('stage'));
    function render(name) {
      const S = SCREENS[name] || SCREENS.today;
      root.render(
        <div style={{ padding: 14 }}>
          <Bezel><S /></Bezel>
        </div>
      );
    }
    window.setScreen = (name) => { window.scrollTo(0,0); render(name); return name; };
    render('today');
  </script>
</body>
